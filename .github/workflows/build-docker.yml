name: Build and Push to Docker Hub

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/contract-processor:latest

      - name: Image details
        run: |
          echo "✅ Image successfully pushed to Docker Hub!"
          echo "Image name: ${{ secrets.DOCKERHUB_USERNAME }}/contract-processor:latest"
          echo ""
          echo "You can now deploy to ACI with:"
          echo "az container create --image ${{ secrets.DOCKERHUB_USERNAME }}/contract-processor:latest"
