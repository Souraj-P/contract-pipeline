name: Build and Push to ACR

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allows manual trigger from Actions tab

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push to ACR
        run: |
          az acr build \
            --registry ${{ secrets.ACR_NAME }} \
            --image contract-processor:v1 \
            --file Dockerfile \
            .

      - name: Verify image in ACR
        run: |
          echo "Verifying image was pushed successfully..."
          az acr repository show \
            --name ${{ secrets.ACR_NAME }} \
            --repository contract-processor \
            --output table
          echo "✅ Image successfully pushed to ACR!"
